<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="15" fill="#00ADB5"/>
  <!-- road "S": jalur berliku (identitas Sundaf) -->
  <path d="M43 17 C 27 13, 18 25, 31 31 C 44 37, 36 50, 21 47"
        fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- garis tengah jalan (putus-putus) -->
  <path d="M43 17 C 27 13, 18 25, 31 31 C 44 37, 36 50, 21 47"
        fill="none" stroke="#00ADB5" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="2.2 4"/>
  <!-- tiang + bendera di ujung atas -->
  <line x1="45" y1="9" x2="45" y2="19" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M45 10 L 54 12.5 L 45 15 Z" fill="#222831"/>
  <!-- titik awal jalan -->
  <circle cx="21" cy="47" r="3.4" fill="#222831"/>
</svg>
